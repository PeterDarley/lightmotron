<div id="sounds-form">
    {% if error %}
    <div class="alert alert-danger small py-2">{{ error }}</div>
    {% endif %}
    {% if message %}
    <div class="alert alert-success small py-2">{{ message }}</div>
    {% endif %}

    <form hx-post="/sounds"
          hx-target="#sounds-form"
          hx-swap="outerHTML">

        <h6 class="mt-0 mb-3">Sound Titles & Files</h6>
        <div class="mb-2">
            <table class="table table-sm table-borderless mb-2" id="sounds-table">
                <thead>
                    <tr>
                        <th class="form-label-sm ps-0">Title</th>
                        <th class="form-label-sm">File #</th>
                        <th class="form-label-sm">Duration (min:sec.ticks)</th>
                        <th class="form-label-sm">HQ</th>
                        <th></th>
                    </tr>
                </thead>
                <tbody id="sounds-tbody">
                    {% for sound in sounds %}
                    <tr>
                        <td class="ps-0">
                            <input type="text" class="form-control form-control-sm" name="sound_title"
                                   value="{{ sound.title }}" placeholder="Title" maxlength="64" required>
                        </td>
                        <td>
                            <input type="number" class="form-control form-control-sm" name="sound_file"
                                   value="{{ sound.file }}" min="1" max="9999" required>
                        </td>
                        <td>
                            <div class="input-group input-group-sm">
                                <input type="number" class="form-control" name="sound_duration_minutes"
                                       value="{% if sound.duration_ms >= 60000 %}{{ (sound.duration_ms // 60000) % 60 }}{% else %}0{% endif %}"
                                       min="0" max="59" style="max-width: 45px;">
                                <span class="input-group-text">:</span>
                                <input type="number" class="form-control" name="sound_duration_seconds"
                                       value="{% if sound.duration_ms >= 1000 %}{{ (sound.duration_ms // 1000) % 60 }}{% else %}0{% endif %}"
                                       min="0" max="59" style="max-width: 45px;">
                                <span class="input-group-text">.</span>
                                <input type="number" class="form-control" name="sound_duration_ticks"
                                       value="{{ (sound.duration_ms % 1000) // 100 }}"
                                       min="0" max="9" style="max-width: 70px;">
                            </div>
                        </td>
                        <td class="text-center align-middle">
                            <input class="form-check-input" type="checkbox" name="sound_high_quality"
                                   value="1" {% if sound.high_quality %}checked{% endif %}>
                        </td>
                        <td>
                            <button type="button" class="btn btn-sm btn-outline-danger"
                                    onclick="this.closest('tr').remove()">✕</button>
                        </td>
                    </tr>
                    {% endfor %}
                </tbody>
            </table>
            <button type="button" class="btn btn-sm btn-outline-secondary" onclick="addSoundRow()">+ Add Sound</button>
            <div class="form-text">Enter title, file number (0001-9999 on SD card), duration, and mark as high quality if applicable.</div>
        </div>

        <button type="submit" class="btn btn-primary btn-sm">Save Sounds</button>
    </form>
</div>

<script>
function addSoundRow() {
    var tbody = document.getElementById('sounds-tbody');
    var row = '<tr>' +
        '<td class="ps-0">' +
        '<input type="text" class="form-control form-control-sm" name="sound_title" placeholder="Title" maxlength="64" required>' +
        '</td>' +
        '<td>' +
        '<input type="number" class="form-control form-control-sm" name="sound_file" value="1" min="1" max="9999" required>' +
        '</td>' +
        '<td>' +
        '<div class="input-group input-group-sm">' +
        '<input type="number" class="form-control" name="sound_duration_minutes" value="0" min="0" max="59" style="max-width: 45px;">' +
        '<span class="input-group-text">:</span>' +
        '<input type="number" class="form-control" name="sound_duration_seconds" value="0" min="0" max="59" style="max-width: 45px;">' +
        '<span class="input-group-text">.</span>' +
        '<input type="number" class="form-control" name="sound_duration_ticks" value="0" min="0" max="9" style="max-width: 70px;">' +
        '</div>' +
        '</td>' +
        '<td class="text-center align-middle">' +
        '<input class="form-check-input" type="checkbox" name="sound_high_quality" value="1">' +
        '</td>' +
        '<td>' +
        '<button type="button" class="btn btn-sm btn-outline-danger" onclick="this.closest(\'tr\').remove()">✕</button>' +
        '</td>' +
        '</tr>';
    tbody.insertAdjacentHTML('beforeend', row);
}
</script>
