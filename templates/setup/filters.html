<div id="filters-manager">
    <form hx-post="/filters"
          hx-target="#filters-manager"
          hx-swap="outerHTML">
        <input type="hidden" name="action" value="create_filter">
        <div class="input-group mb-3" style="max-width: 400px;">
            <input type="text" class="form-control" name="filter_name" placeholder="New filter name" required>
            <button type="submit" class="btn btn-primary">Create Filter</button>
        </div>
    </form>

    {% if filters %}
    <table class="table table-hover align-middle mb-0">
        <thead>
            <tr>
                <th>Filter</th>
                <th>Type</th>
                <th style="width: 140px;"></th>
            </tr>
        </thead>
        <tbody>
            {% for filter in filters %}
            <tr>
                <td><strong>{{ filter.name }}</strong></td>
                <td><span class="text-muted">{{ filter.filter_type }}</span></td>
                <td class="text-end">
                    <button class="btn btn-sm btn-outline-primary me-1"
                            hx-get="/filters/edit?filter={{ filter.name }}"
                            hx-target="#modal-body"
                            hx-swap="innerHTML">
                        Edit
                    </button>
                    <button class="btn btn-sm btn-outline-danger"
                            hx-post="/filters"
                            hx-target="#filters-manager"
                            hx-swap="outerHTML"
                            hx-vals='{"filter_name": "{{ filter.name }}", "action": "delete_filter"}'
                            hx-confirm="Delete filter '{{ filter.name }}'?">
                        Delete
                    </button>
                </td>
            </tr>
            {% endfor %}
        </tbody>
    </table>
    {% else %}
    <p class="text-muted small mt-2">No filters yet. Create one above.</p>
    {% endif %}
</div>
