<div id="scenes-manager">
    <form hx-post="/scenes"
          hx-target="#scenes-manager"
          hx-swap="outerHTML">
        <input type="hidden" name="action" value="create_scene">
        <div class="input-group mb-3" style="max-width: 400px;">
            <input type="text" class="form-control" name="scene_name" placeholder="New scene name" required>
            <button type="submit" class="btn btn-primary">Create Scene</button>
        </div>
    </form>

    {% if scenes %}
    <table class="table table-hover align-middle mb-0">
        <thead>
            <tr>
                <th>Scene</th>
                <th class="text-center" style="width: 100px;">Effects</th>
                <th style="width: 140px;"></th>
            </tr>
        </thead>
        <tbody>
            {% for scene in scenes %}
            <tr>
                <td><strong>{{ scene.name }}</strong></td>
                <td class="text-center"><span class="badge bg-secondary">{{ scene.effect_count }}</span></td>
                <td class="text-end">
                    <button class="btn btn-sm btn-outline-primary me-1"
                            hx-get="/scenes/edit?scene={{ scene.name }}"
                            hx-target="#modal-body"
                            hx-swap="innerHTML">
                        Edit
                    </button>
                    <button class="btn btn-sm btn-outline-danger"
                            hx-post="/scenes"
                            hx-target="#scenes-manager"
                            hx-swap="outerHTML"
                            hx-vals='{"scene_name": "{{ scene.name }}", "action": "delete_scene"}'
                            hx-confirm="Delete scene '{{ scene.name }}'?">
                        Delete
                    </button>
                </td>
            </tr>
            {% endfor %}
        </tbody>
    </table>
    {% else %}
    <p class="text-muted small mt-2">No scenes yet. Create one above.</p>
    {% endif %}
</div>
