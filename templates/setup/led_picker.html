<div id="led-picker">
    <div class="d-flex flex-wrap gap-1 mb-3" id="led-buttons">
        {% for led in led_list %}
        <button type="button"
                class="btn btn-sm {{ led.css_class }} led-btn"
                style="width: 2.2rem; height: 2.2rem; padding: 0; font-size: 0.6rem;"
                data-led-index="{{ led.index }}">
            {{ led.index }}
        </button>
        {% endfor %}
    </div>

    <form hx-post="/named_range"
          hx-target="#led-picker"
          hx-swap="outerHTML"
          id="range-form">
        <input type="hidden" id="selected-leds" name="selected_leds" value="">
        <div class="input-group mb-2" style="max-width: 400px;">
            <input type="text" class="form-control" name="range_name" placeholder="Range name (e.g. cockpit)" required>
            <button type="submit" class="btn btn-primary">Save</button>
            <button type="button" class="btn btn-outline-danger" id="clear-btn">Clear</button>
        </div>
    </form>

    {% for range_name in named_range_names %}
    <button type="button"
            class="btn btn-outline-secondary btn-sm me-1 mb-2"
            hx-get="/named_range/edit?name={{ range_name }}"
            hx-target="#led-picker"
            hx-swap="outerHTML">
        {{ range_name }}
    </button>
    {% endfor %}

    <script src="/scripts/led_picker.js"></script>
</div>
