<div id="led-picker">
    <div class="d-flex flex-wrap gap-1 mb-3">
        {% for led in led_list %}
        <button type="button"
                class="btn btn-sm {{ led.css_class }} led-btn"
                style="width: 2.2rem; height: 2.2rem; padding: 0; font-size: 0.6rem;"
                hx-get="/named_range/toggle?led={{ led.index }}"
                hx-target="#led-picker"
                hx-swap="outerHTML">
            {{ led.index }}
        </button>
        {% endfor %}
    </div>

    <form hx-post="/named_range"
          hx-target="#led-picker"
          hx-swap="outerHTML">
        <div class="input-group mb-2" style="max-width: 400px;">
            <input type="text" class="form-control" name="range_name" placeholder="Range name (e.g. cockpit)" required>
            <button type="submit" class="btn btn-primary">Save</button>
            <a class="btn btn-outline-danger"
               hx-get="/named_range/clear"
               hx-target="#led-picker"
               hx-swap="outerHTML">Clear</a>
        </div>
    </form>

    {% for range_name in named_range_names %}
    <span class="badge bg-secondary me-1">{{ range_name }}</span>
    {% endfor %}
</div>
