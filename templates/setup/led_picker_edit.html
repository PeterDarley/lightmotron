<div id="led-picker">
    <div class="d-flex flex-wrap gap-1 mb-3" id="led-buttons">
        {% for led in led_list %}
        <button type="button"
                class="btn btn-sm {{ led.css_class }} led-btn"
                style="width: 2.2rem; height: 2.2rem; padding: 0; font-size: 0.6rem;"
                data-led-index="{{ led.index }}">
            {{ led.index }}
        </button>
        {% endfor %}
    </div>

    <form hx-post="/named_range/edit"
          hx-target="#led-picker"
          hx-swap="outerHTML"
          id="range-form">
        <input type="hidden" name="old_name" value="{{ range_name }}">
        <input type="hidden" id="selected-leds" name="selected_leds" value="">
        <div class="input-group mb-2" style="max-width: 400px;">
            <input type="text" class="form-control" name="new_name" value="{{ range_name }}" required>
            <button type="submit" name="action" value="save" class="btn btn-primary">Save</button>
            <button type="submit" name="action" value="delete" class="btn btn-outline-danger">Delete</button>
        </div>
        <button type="button" class="btn btn-outline-secondary btn-sm" id="back-btn">Back</button>
    </form>

    <div class="mt-3">
        <small class="text-muted">Other ranges:</small>
        <div>
            {% for other_name in named_range_names %}
                {% if other_name != range_name %}
                <button type="button"
                        class="btn btn-outline-secondary btn-sm me-1 mb-2"
                        hx-get="/named_range/edit?name={{ other_name }}"
                        hx-target="#led-picker"
                        hx-swap="outerHTML">
                    {{ other_name }}
                </button>
                {% endif %}
            {% endfor %}
        </div>
    </div>

    <script>
    (function() {
        const selectedLeds = new Set();
        const ledButtons = document.querySelectorAll('.led-btn');
        const selectedLedsInput = document.getElementById('selected-leds');
        const backBtn = document.getElementById('back-btn');
        const rangeForm = document.getElementById('range-form');

        function updateSelectedLedsInput() {
            const sorted = Array.from(selectedLeds).sort((a, b) => a - b);
            selectedLedsInput.value = sorted.join(',');
        }

        ledButtons.forEach(btn => {
            const ledIndex = parseInt(btn.dataset.ledIndex);
            if (btn.classList.contains('btn-warning')) {
                selectedLeds.add(ledIndex);
            }
            btn.addEventListener('click', (e) => {
                e.preventDefault();
                if (selectedLeds.has(ledIndex)) {
                    selectedLeds.delete(ledIndex);
                    btn.classList.remove('btn-warning');
                    btn.classList.add('btn-outline-secondary');
                } else {
                    selectedLeds.add(ledIndex);
                    btn.classList.remove('btn-outline-secondary');
                    btn.classList.add('btn-warning');
                }
                updateSelectedLedsInput();
                
                // Send HTMX request to toggle LED on hardware
                htmx.ajax('GET', '/named_range/toggle?led=' + ledIndex, {
                    target: '#led-picker',
                    swap: 'outerHTML'
                });
            });
        });

        backBtn.addEventListener('click', (e) => {
            e.preventDefault();
            htmx.ajax('GET', '/named_range', {target: '#led-picker', swap: 'outerHTML'});
        });

        rangeForm.addEventListener('htmx:beforeRequest', (e) => {
            updateSelectedLedsInput();
        });

        updateSelectedLedsInput();
    })();
    </script>
</div>
