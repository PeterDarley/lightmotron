<div id="edit-scene-modal" class="modal fade" tabindex="-1">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title">Edit Scene: {{ scene_name }}</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <form hx-post="/api/scene_edit"
                  hx-target="#scene_buttons"
                  hx-swap="outerHTML"
                  hx-on::after-request="if(event.detail.xhr.status === 200) bootstrap.Modal.getInstance(document.getElementById('edit-scene-modal')).hide()">
                <div class="modal-body">
                    <input type="hidden" name="scene_name" value="{{ scene_name }}">
                    <div class="mb-3">
                        <label for="scene-name-input" class="form-label">Scene Name</label>
                        <input type="text" class="form-control" id="scene-name-input" name="name" value="{{ scene_name }}" readonly>
                    </div>
                    <div class="mb-3">
                        <label for="scene-description" class="form-label">Description</label>
                        <textarea class="form-control" id="scene-description" name="description" rows="3"></textarea>
                    </div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
                    <button type="submit" class="btn btn-primary">Save Changes</button>
                </div>
            </form>
        </div>
    </div>
</div>
